name: foodeez_flutter
description: Foodeez Restaurant Admin App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^17.3.0

  # State Management
  flutter_riverpod: ^3.3.2

  # Network
  dio: ^5.4.3+1

  # Local Storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^10.3.1

  # UI
  google_fonts: ^8.1.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  fl_chart: ^1.2.0
  flutter_svg: ^2.0.10+1
  badges: ^3.1.2

  # Forms & Validation
  flutter_form_builder: ^10.3.0+2
  form_builder_validators: ^11.3.0

  # Utils
  intl: ^0.20.0
  timeago: ^3.6.1
  image_picker: ^1.1.2
  file_picker: ^12.0.0-beta.5
  permission_handler: ^12.0.3

  # Real-time
  socket_io_client: ^3.1.6

  # Crypto (password encryption matching web)
  encrypt: ^5.0.3

  # Connectivity
  connectivity_plus: ^7.1.1

  # Audio alerts for KDS
  audioplayers: ^6.1.0

  cupertino_icons: ^1.0.6
  pull_to_refresh_flutter3: ^2.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/partner_app_icon.png
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/images/partner_app_icon_foreground.png
  remove_alpha_ios: true
  background_color_ios: "#FFFFFF"




  

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
